#Install docker. Steps are from official docker website, just converted to ansible tasks
- name: Uninstall all conflicting packages and do apt update
  ansible.builtin.apt:
    name:
    - docker.io
    - docker-compose
    - docker-compose-v2
    - docker-doc
    - podman-docker
    - containerd
    - runc
    state: absent
    purge: yes
    autoremove: yes
    update_cache: true
  become: true
  become_method: sudo

- name: install ca-certificates and curl
  ansible.builtin.apt:
    name:
    - ca-certificates
    - curl
    state: present
  become: true
  become_method: sudo

- name: Create directory for apt keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '755'
  become: true
  become_method: sudo

- name: Download docker gpg keyrings
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '644'
  become: true
  become_method: sudo

- name: update apt update_cache, python prerequisies for ansilbe modules
  ansible.builtin.apt:
    update_cache: true
    name:
    - python3-pip
    - python3-docker
    - python3-jsondiff
    - python3-debian
    - acl
    state: present
  become: true
  become_method: sudo

- name: Add apt repo
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_distribution_release }}"
    components: stable
    signed_by: /etc/apt/keyrings/docker.asc
  become: true
  become_method: sudo

- name: update apt update_cache, install docker and required pkg
  ansible.builtin.apt:
    update_cache: true
    name:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
    state: present
  become: true
  become_method: sudo

- name: run docker/make sure it's running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true
  become_method: sudo

- name: add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes
  become: true
  become_method: sudo

# <-------------docker install complete----------->
