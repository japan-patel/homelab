services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - auth
    volumes:
      - ./caddy_config:/etc/caddy
      - caddy_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - homepage.group=Admin
        - homepage.name=Caddy
        - homepage.showStats=false
        - homepage.icon=caddy.svg

networks:
  auth:
    external: true

volumes:
  caddy_data:
    external: true