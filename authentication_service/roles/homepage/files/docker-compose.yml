services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
    - CONTAINERS=1 # Allow access to viewing containers
    - SERVICES=1 # Allow access to viewing services (necessary when using Docker Swarm)
    - TASKS=1 # Allow access to viewing tasks (necessary when using Docker Swarm)
    - POST=0 # Disallow any POST operations (effectively read-only)
    ports:
    - 127.0.0.1:2375:2375
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro # Mounted as read-only
    networks:
    - auth
    deploy:
      placement:
        constraints:
        - node.role == manager # Ensure the proxy runs on a manager node in a Swarm cluster

  homepage:
    image: gethomepage/homepage:latest
    container_name: homepage
    networks: 
      - auth
    volumes:
      - ./config:/app/config
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=homepage.home.com    #<---make sure to update FQDN
    deploy:
      placement:
        constraints:
        - node.role == manager # Ensure the homepage runs on a manager node in a Swarm cluster

networks:
  auth:
    external: true