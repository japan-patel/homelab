- name: Create LLDAP secrets
  community.docker.docker_secret:
    name: "{{ item.key}}"
    data: "{{ item.value }}"
    state: present
  loop: "{{ lldap | dict2items }}"

- name: copy data folder and docker compose for lldap
  ansible.builtin.copy:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ ansible_env.HOME }}/auth/lldap/"
    owner: "{{ docker_user }}"
    mode: '755'
  loop:
  - docker-compose.yml
  - data

- name: deploy lldap stack
  community.docker.docker_stack:
    name: auth
    state: present
    compose: "{{ ansible_env.HOME }}/auth/lldap/docker-compose.yml"
